<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <linearGradient id="bgGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f8f7ff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <radialGradient id="glowPurpleL" cx="20%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyanL" cx="85%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#0891b2" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="ringGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="jarvisGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="osGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="borderGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="50%"  stop-color="#0891b2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="860" height="200" rx="16" fill="url(#bgGradL)"/>
  <rect width="860" height="200" rx="16" fill="url(#glowPurpleL)"/>
  <rect width="860" height="200" rx="16" fill="url(#glowCyanL)"/>

  <!-- 미세 격자 -->
  <g opacity="0.06">
    <line x1="0" y1="40"  x2="860" y2="40"  stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="80"  x2="860" y2="80"  stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="860" y2="120" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="860" y2="160" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="172" y1="0" x2="172" y2="200" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="344" y1="0" x2="344" y2="200" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="516" y1="0" x2="516" y2="200" stroke="#7c3aed" stroke-width="0.5"/>
    <line x1="688" y1="0" x2="688" y2="200" stroke="#7c3aed" stroke-width="0.5"/>
  </g>

  <!-- 테두리 -->
  <rect width="858" height="198" rx="16" x="1" y="1" fill="none" stroke="url(#borderGradL)" stroke-width="1.5"/>

  <!-- 아이콘 배경 -->
  <circle cx="100" cy="100" r="64" fill="#7c3aed" opacity="0.05"/>
  <circle cx="100" cy="100" r="56" fill="none" stroke="url(#ringGradL)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="100" cy="100" r="56" fill="none" stroke="#f8f7ff" stroke-width="2" stroke-dasharray="20 8"/>
  <circle cx="100" cy="100" r="56" fill="none" stroke="url(#ringGradL)" stroke-width="1.5" stroke-dasharray="20 8" opacity="0.7"/>

  <!-- 육각형 -->
  <polygon points="100,52 138,74 138,118 100,140 62,118 62,74"
    fill="#f0eeff" stroke="url(#ringGradL)" stroke-width="1.5"/>

  <!-- 코어 -->
  <circle cx="100" cy="96" r="16" fill="url(#iconGradL)" opacity="0.85"/>
  <circle cx="100" cy="96" r="10" fill="#f8f7ff"/>
  <circle cx="100" cy="96" r="5"  fill="url(#iconGradL)"/>

  <g stroke="url(#iconGradL)" stroke-width="1.5" opacity="0.75">
    <line x1="100" y1="80" x2="100" y2="67"/>
    <line x1="113" y1="84" x2="122" y2="76"/>
    <line x1="115" y1="96" x2="128" y2="96"/>
    <line x1="113" y1="108" x2="122" y2="116"/>
    <line x1="100" y1="112" x2="100" y2="125"/>
    <line x1="87"  y1="108" x2="78"  y2="116"/>
    <line x1="85"  y1="96"  x2="72"  y2="96"/>
    <line x1="87"  y1="84"  x2="78"  y2="76"/>
  </g>

  <g fill="url(#iconGradL)">
    <circle cx="100" cy="65" r="4"/>
    <circle cx="124" cy="74" r="3.5"/>
    <circle cx="130" cy="96" r="3.5"/>
    <circle cx="124" cy="118" r="3.5"/>
    <circle cx="100" cy="127" r="4"/>
    <circle cx="76"  cy="118" r="3.5"/>
    <circle cx="70"  cy="96"  r="3.5"/>
    <circle cx="76"  cy="74"  r="3.5"/>
  </g>

  <!-- JARVIS 텍스트 -->
  <text x="178" y="108"
    font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif"
    font-size="72" font-weight="900" letter-spacing="-1"
    fill="url(#jarvisGradL)">JARVIS</text>

  <!-- 구분 점 -->
  <circle cx="550" cy="86" r="5" fill="#7c3aed" opacity="0.7"/>

  <!-- OS 텍스트 -->
  <text x="565" y="108"
    font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif"
    font-size="72" font-weight="900"
    fill="url(#osGradL)">OS</text>

  <!-- 서브타이틀 -->
  <text x="178" y="145"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="15" font-weight="400" letter-spacing="5"
    fill="#9ca3af">ORCHESTRATION  AGENT</text>

  <!-- 뱃지들 -->
  <rect x="668" y="130" width="132" height="28" rx="14"
    fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <text x="734" y="148"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="11.5" font-weight="600" text-anchor="middle" letter-spacing="1.5"
    fill="#7c3aed" opacity="0.8">9 AGENTS</text>

  <rect x="668" y="164" width="132" height="24" rx="12"
    fill="none" stroke="#0891b2" stroke-width="1" opacity="0.4"/>
  <text x="734" y="180"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="10" font-weight="600" text-anchor="middle" letter-spacing="1.5"
    fill="#0891b2" opacity="0.7">PHASE 0  COMPLETE</text>

  <line x1="178" y1="155" x2="655" y2="155" stroke="#e5e7eb" stroke-width="1"/>
</svg>
