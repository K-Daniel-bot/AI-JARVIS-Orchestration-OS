<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <!-- 배경 그라디언트 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <!-- 보라 글로우 -->
    <radialGradient id="glowPurple" cx="20%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <!-- 시안 글로우 -->
    <radialGradient id="glowCyan" cx="85%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <!-- 아이콘 내부 그라디언트 -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- 아이콘 링 그라디언트 -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <!-- 텍스트 JARVIS 그라디언트 -->
    <linearGradient id="jarvisGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <!-- 텍스트 OS 그라디언트 -->
    <linearGradient id="osGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- 필터: 글로우 효과 -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 테두리 그라디언트 -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="860" height="200" rx="16" fill="url(#bgGrad)"/>

  <!-- 글로우 오버레이 -->
  <rect width="860" height="200" rx="16" fill="url(#glowPurple)"/>
  <rect width="860" height="200" rx="16" fill="url(#glowCyan)"/>

  <!-- 미세 격자 패턴 (배경 텍스처) -->
  <g opacity="0.04">
    <line x1="0" y1="40"  x2="860" y2="40"  stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="80"  x2="860" y2="80"  stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="860" y2="120" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="860" y2="160" stroke="#fff" stroke-width="0.5"/>
    <line x1="172" y1="0" x2="172" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="344" y1="0" x2="344" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="516" y1="0" x2="516" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="688" y1="0" x2="688" y2="200" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- 테두리 (그라디언트) -->
  <rect width="858" height="198" rx="16" x="1" y="1" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- ───────────────────────────────────────────────────────── -->
  <!--  마스코트 아이콘 영역 (왼쪽)                              -->
  <!-- ───────────────────────────────────────────────────────── -->

  <!-- 아이콘 배경 원형 글로우 -->
  <circle cx="100" cy="100" r="64" fill="#7c3aed" opacity="0.08"/>
  <circle cx="100" cy="100" r="52" fill="#7c3aed" opacity="0.06"/>

  <!-- 아이콘 외부 링 -->
  <circle cx="100" cy="100" r="56" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.7"/>
  <!-- 링 회전 장식 (끊김 효과) -->
  <circle cx="100" cy="100" r="56" fill="none" stroke="#0a0a0f" stroke-width="2" stroke-dasharray="20 8" opacity="1"/>
  <circle cx="100" cy="100" r="56" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="20 8" opacity="0.9"/>

  <!-- 아이콘 내부: 육각형 베이스 -->
  <polygon points="100,52 138,74 138,118 100,140 62,118 62,74"
    fill="#0d0d1a" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.9"/>

  <!-- 아이콘: AI 뇌/회로 심볼 -->
  <!-- 중앙 원 (코어) -->
  <circle cx="100" cy="96" r="16" fill="url(#iconGrad)" opacity="0.9" filter="url(#iconGlow)"/>
  <circle cx="100" cy="96" r="10" fill="#0a0a0f"/>
  <circle cx="100" cy="96" r="5"  fill="url(#iconGrad)" opacity="0.95"/>

  <!-- 방사형 연결선 (에이전트 노드) -->
  <g stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.8">
    <line x1="100" y1="80" x2="100" y2="67"/>  <!-- 위 -->
    <line x1="113" y1="84" x2="122" y2="76"/>  <!-- 우상 -->
    <line x1="115" y1="96" x2="128" y2="96"/>  <!-- 오른쪽 -->
    <line x1="113" y1="108" x2="122" y2="116"/> <!-- 우하 -->
    <line x1="100" y1="112" x2="100" y2="125"/> <!-- 아래 -->
    <line x1="87"  y1="108" x2="78"  y2="116"/> <!-- 좌하 -->
    <line x1="85"  y1="96"  x2="72"  y2="96"/>  <!-- 왼쪽 -->
    <line x1="87"  y1="84"  x2="78"  y2="76"/>  <!-- 좌상 -->
    <line x1="87"  y1="84"  x2="78"  y2="76"/>  <!-- 좌상 -->
  </g>

  <!-- 에이전트 노드 점 (8개) -->
  <g fill="url(#iconGrad)" filter="url(#iconGlow)">
    <circle cx="100" cy="65" r="4"/>
    <circle cx="124" cy="74" r="3.5"/>
    <circle cx="130" cy="96" r="3.5"/>
    <circle cx="124" cy="118" r="3.5"/>
    <circle cx="100" cy="127" r="4"/>
    <circle cx="76"  cy="118" r="3.5"/>
    <circle cx="70"  cy="96"  r="3.5"/>
    <circle cx="76"  cy="74"  r="3.5"/>
  </g>

  <!-- 작은 장식 점 (오른쪽 상단) -->
  <circle cx="144" cy="56" r="2" fill="#7c3aed" opacity="0.7"/>
  <circle cx="152" cy="62" r="1.5" fill="#06b6d4" opacity="0.6"/>
  <circle cx="148" cy="70" r="1" fill="#a78bfa" opacity="0.5"/>

  <!-- ───────────────────────────────────────────────────────── -->
  <!--  메인 텍스트 영역                                         -->
  <!-- ───────────────────────────────────────────────────────── -->

  <!-- "JARVIS" 메인 타이틀 -->
  <text x="178" y="108"
    font-family="'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif"
    font-size="72"
    font-weight="900"
    letter-spacing="-1"
    fill="url(#jarvisGrad)"
    filter="url(#softGlow)">JARVIS</text>

  <!-- "OS" 강조 텍스트 (시안) -->
  <text x="178" y="108"
    font-family="'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif"
    font-size="72"
    font-weight="900"
    letter-spacing="-1"
    fill="url(#jarvisGrad)">JARVIS</text>

  <!-- OS 텍스트 (오른쪽) -->
  <text x="565" y="108"
    font-family="'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif"
    font-size="72"
    font-weight="900"
    fill="url(#osGrad)"
    filter="url(#softGlow)">OS</text>

  <text x="565" y="108"
    font-family="'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif"
    font-size="72"
    font-weight="900"
    fill="url(#osGrad)">OS</text>

  <!-- 구분 점 -->
  <circle cx="550" cy="86" r="5" fill="#7c3aed" opacity="0.9"/>

  <!-- 서브타이틀: "Orchestration Agent" -->
  <text x="178" y="145"
    font-family="'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif"
    font-size="15"
    font-weight="400"
    letter-spacing="5"
    fill="#6b7280">ORCHESTRATION  AGENT</text>

  <!-- 우측 장식: 9 agents 뱃지 -->
  <rect x="668" y="130" width="132" height="28" rx="14"
    fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
  <text x="734" y="148"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="11.5"
    font-weight="600"
    text-anchor="middle"
    letter-spacing="1.5"
    fill="#a78bfa" opacity="0.85">9 AGENTS</text>

  <!-- 우측 장식: phase 뱃지 -->
  <rect x="668" y="164" width="132" height="24" rx="12"
    fill="none" stroke="#0891b2" stroke-width="1" opacity="0.5"/>
  <text x="734" y="180"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="10"
    font-weight="600"
    text-anchor="middle"
    letter-spacing="1.5"
    fill="#38bdf8" opacity="0.8">PHASE 0  COMPLETE</text>

  <!-- 하단 미세 라인 (구분자) -->
  <line x1="178" y1="155" x2="655" y2="155" stroke="#1f1f2e" stroke-width="1"/>

</svg>
