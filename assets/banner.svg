<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#f0d78c"/>
    </linearGradient>
    <linearGradient id="accentVertical" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#c9a84c">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)"/>

  <!-- Left decorative mark -->
  <rect x="80" y="120" width="4" height="160" fill="url(#accentVertical)"/>

  <!-- Logo mark: stylized J -->
  <g transform="translate(120, 140)">
    <rect x="0" y="0" width="48" height="48" rx="8" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <text x="24" y="35" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#c9a84c" text-anchor="middle">J</text>
  </g>

  <!-- Main title -->
  <text x="190" y="178" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="1">JARVIS</text>

  <!-- Subtitle line 1 -->
  <text x="120" y="218" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#c9a84c" letter-spacing="4" font-weight="500">ORCHESTRATION AGENT OS</text>

  <!-- Divider -->
  <line x1="120" y1="238" x2="480" y2="238" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>

  <!-- Tagline -->
  <text x="120" y="268" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#888888" letter-spacing="1">Policy-Governed AI Agent System for Desktop Automation</text>

  <!-- Right side: architecture diagram mini -->
  <g transform="translate(620, 90)" opacity="0.6">
    <!-- Orchestrator box -->
    <rect x="80" y="0" width="140" height="36" rx="4" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <text x="150" y="23" font-family="'Courier New', monospace" font-size="11" fill="#c9a84c" text-anchor="middle">Orchestrator</text>

    <!-- Lines down -->
    <line x1="110" y1="36" x2="40" y2="70" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
    <line x1="150" y1="36" x2="150" y2="70" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
    <line x1="190" y1="36" x2="260" y2="70" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>

    <!-- Agent boxes row 1 -->
    <rect x="0" y="70" width="80" height="28" rx="3" fill="none" stroke="#555" stroke-width="0.7"/>
    <text x="40" y="88" font-family="'Courier New', monospace" font-size="9" fill="#777" text-anchor="middle">Spec</text>

    <rect x="110" y="70" width="80" height="28" rx="3" fill="none" stroke="#555" stroke-width="0.7"/>
    <text x="150" y="88" font-family="'Courier New', monospace" font-size="9" fill="#777" text-anchor="middle">Policy</text>

    <rect x="220" y="70" width="80" height="28" rx="3" fill="none" stroke="#555" stroke-width="0.7"/>
    <text x="260" y="88" font-family="'Courier New', monospace" font-size="9" fill="#777" text-anchor="middle">Planner</text>

    <!-- Lines down row 2 -->
    <line x1="150" y1="98" x2="90" y2="130" stroke="#555" stroke-width="0.5" opacity="0.4"/>
    <line x1="150" y1="98" x2="150" y2="130" stroke="#555" stroke-width="0.5" opacity="0.4"/>
    <line x1="150" y1="98" x2="210" y2="130" stroke="#555" stroke-width="0.5" opacity="0.4"/>

    <!-- Agent boxes row 2 -->
    <rect x="50" y="130" width="80" height="28" rx="3" fill="none" stroke="#555" stroke-width="0.7"/>
    <text x="90" y="148" font-family="'Courier New', monospace" font-size="9" fill="#777" text-anchor="middle">Codegen</text>

    <rect x="170" y="130" width="80" height="28" rx="3" fill="none" stroke="#555" stroke-width="0.7"/>
    <text x="210" y="148" font-family="'Courier New', monospace" font-size="9" fill="#777" text-anchor="middle">Review</text>

    <!-- Gate indicator -->
    <rect x="100" y="175" width="100" height="24" rx="3" fill="#c9a84c" fill-opacity="0.1" stroke="#c9a84c" stroke-width="0.7"/>
    <text x="150" y="191" font-family="'Courier New', monospace" font-size="9" fill="#c9a84c" text-anchor="middle">Approval Gate</text>

    <line x1="150" y1="158" x2="150" y2="175" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>

    <!-- Executor -->
    <rect x="100" y="215" width="100" height="28" rx="3" fill="none" stroke="#c9a84c" stroke-width="0.7" opacity="0.7"/>
    <text x="150" y="233" font-family="'Courier New', monospace" font-size="9" fill="#c9a84c" text-anchor="middle" opacity="0.7">Executor</text>

    <line x1="150" y1="199" x2="150" y2="215" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Bottom badges area -->
  <g transform="translate(120, 310)">
    <!-- Status badge -->
    <rect x="0" y="0" width="120" height="24" rx="12" fill="#c9a84c" fill-opacity="0.1" stroke="#c9a84c" stroke-width="0.7"/>
    <text x="60" y="16" font-family="'Segoe UI', sans-serif" font-size="10" fill="#c9a84c" text-anchor="middle" font-weight="600">Architecture</text>

    <rect x="135" y="0" width="90" height="24" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#555" stroke-width="0.7"/>
    <text x="180" y="16" font-family="'Segoe UI', sans-serif" font-size="10" fill="#888" text-anchor="middle">9 Agents</text>

    <rect x="240" y="0" width="100" height="24" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#555" stroke-width="0.7"/>
    <text x="290" y="16" font-family="'Segoe UI', sans-serif" font-size="10" fill="#888" text-anchor="middle">7 Gate Types</text>

    <rect x="355" y="0" width="120" height="24" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#555" stroke-width="0.7"/>
    <text x="415" y="16" font-family="'Segoe UI', sans-serif" font-size="10" fill="#888" text-anchor="middle">Policy-Governed</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="398" width="1200" height="2" fill="url(#accent)"/>

  <!-- Copyright -->
  <text x="1080" y="380" font-family="'Segoe UI', sans-serif" font-size="10" fill="#444" text-anchor="middle">2026</text>
</svg>